# Preliminary physical measurements for the room-reconstruction rig.
#
# Coordinate convention:
#   lidar frame: +x points in the lidar's 0-degree direction
#                +y points left when viewed from above
#                +z points upward
#
# Translation components describe the camera optical center relative to the
# lidar measurement center. Leave unknown values as null until measured.

rig_revision: "rig-002-robot-chassis"
measurement_date: "2026-06-23"
status: "rough physical measurements from annotated photos; not calibrated"

lidar_to_camera:
  center_to_center_distance_m: 0.1205
  center_to_center_distance_source: "computed from annotated robot-chassis photos"
  current_layout_description: "camera elevated on taped mast above shared robot chassis"

  raw_measurements_inches:
    camera_forward_back_magnitude: 2.9
    camera_lateral_magnitude: 0.2
    camera_vertical_magnitude: 3.75

  # Required before this becomes a usable translation vector.
  camera_forward_m: -0.0737
  camera_left_m: 0.0051
  camera_up_m: 0.0953

  # Required before this becomes a usable rigid transform.
  camera_roll_deg: -3
  camera_pitch_deg: null
  camera_yaw_deg: null

  provisional_lidar_angle_offset_deg: 115
  provisional_lidar_angle_offset_source: "20260623T215235Z fine angle sweep; user selected +115 degrees"
  provisional_camera_roll_source: "roll sweep with lidar angle fixed at +115 degrees; user reported -2 and -4 degrees were best, so -3 degrees is recorded as midpoint"

notes:
  - "The 2.9, 0.2, and 3.75 inch measurements convert to 0.0737, 0.0051, and 0.0953 meters."
  - "The center-to-center distance is sqrt(2.9^2 + 0.2^2 + 3.75^2) = 4.745 inches, or 0.1205 meters."
  - "camera_forward_m is negative under the current assumption that the camera is behind the lidar relative to the camera viewing direction."
  - "camera_left_m sign is preliminary because the annotated photo gives magnitude more confidently than side."
  - "The +115 degree lidar angle offset is a software calibration parameter, not a reason to rotate the lidar on the mount."
  - "Camera roll is provisionally set to -3 degrees; pitch, intrinsics, and the translation signs still need refinement before marking geometry valid."
  - "Do not use this file as a calibrated extrinsic transform yet; tune with projection overlays."
